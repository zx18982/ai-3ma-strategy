# ============================================================
# 双均线交叉策略 — 规范文件 (Specification)
# Task 03: Moving Average Crossover Strategy
# ============================================================
# 用途：基于中芯国际、比亚迪、长江电力三只典型股票的
#       日线数据，实现双均线交叉策略（金叉买入/死叉卖出），
#       进行可视化展示与回测评估（MDD、Sharpe Ratio、
#       Cumulative Return 等量化指标）。
# 本 spec 是后续开发的唯一蓝图，所有实现须严格遵循此文件。
# ============================================================

